<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn TV Mozaïek & EPG</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #aaa;
        }
        .mozaiek-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1400px;
        }
        .zender-blok {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .mozaiek-item {
            background-color: #222;
            border: 3px solid transparent;
            border-radius: 10px;
            padding: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 16 / 9;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .mozaiek-item:focus, .mozaiek-item:hover {
            border-color: #3b82f6;
            background-color: #333;
            transform: scale(1.03);
            outline: none;
        }
        .mozaiek-item img {
            max-width: 65%;
            max-height: 65%;
            object-fit: contain;
        }
        .epg-button {
            background-color: #333;
            color: #3b82f6;
            border: 2px solid transparent;
            border-radius: 6px;
            padding: 6px;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .epg-button:focus, .epg-button:hover {
            background-color: #3b82f6;
            color: white;
            border-color: white;
            outline: none;
        }
    </style>
</head>
<body>

    <h1>Mijn Digitale TV Gids</h1>

    <div class="mozaiek-container">
        
        <!-- VRT 1 -->
        <div class="zender-blok">
            <a href="vrtnu://" class="mozaiek-item">                  
                <img src="een-be.png" alt="VRT 1">
            </a>
            <a href="https://vrt.be" class="epg-button">VRT 1 GIDS</a>
        </div>

        <!-- VRT CANVAS -->
        <div class="zender-blok">
            <a href="vrtnu://" class="mozaiek-item">                  
                <img src="canvas.png" alt="Canvas">
            </a>
            <a href="https://vrt.be" class="epg-button">CANVAS GIDS</a>
        </div>

        <!-- VTM  -->
        <div class="zender-blok">
            <a href="vtmgo://www.vtmgo.be" class="mozaiek-item">                  
                <img src="vtmgo.png" alt="VTM">
            </a>
            <a href="https://vtm.be" class="epg-button">VTM GIDS</a>
        </div>

        <!-- PLAY  -->
        <div class="zender-blok">
            <a href="playtv://" class="mozaiek-item">                  
                <img src="play.png" alt="Play">
            </a>
            <a href="https://play.tv" class="epg-button">PLAY GIDS</a>
        </div>

        <!-- PLAY FICTION -->
        <div class="zender-blok">
            <a href="playtv://" class="mozaiek-item">                  
                <img src="playfiction.png" alt="Play FICTION">
            </a>
            <a href="https://play.tv" class="epg-button">PLAY FICTION GIDS</a>
        </div>

        <!-- RTBF LA UNE -->
        <div class="zender-blok">
            <a href="https://auvio.rtbf.be" class="mozaiek-item">                  
                <img src="la-une.png" alt="RTBF Auvio">
            </a>
            <a href="https://rtbf.be" class="epg-button">RTBF GIDS</a>
        </div>

    </div>

</body>
</html>
</html>
