<!DOCTYPE html>
<html lang="nl">
<head>  
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn TV Mozaïek</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .mozaiek-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 1400px;
        }
        .mozaiek-item {
            background-color: #222;
            border: 3px solid transparent;
            border-radius: 10px;
            padding: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 16 / 9;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .mozaiek-item:focus, .mozaiek-item:hover {
            border-color: #3b82f6;
            background-color: #333;
            transform: scale(1.05);
            outline: none;
        }
        .mozaiek-item img {
            max-width: 65%;
            max-height: 65%;
            object-fit: contain;
        }
    </style>
</head>
	
<body>
    <div class="mozaiek-container">
