<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belgische TV Mozaïek</title>
     <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .mozaiek-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 1400px;
        }
        .mozaiek-item {
            background-color: #222;
            border: 3px solid transparent;
            border-radius: 10px;
            padding: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 16 / 9;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .mozaiek-item:focus, .mozaiek-item:hover {
            border-color: #3b82f6;
            background-color: #333;
            transform: scale(1.05);
            outline: none;
        }
        .mozaiek-item img {
            max-width: 65%;
            max-height: 65%;
            object-fit: contain;
        }
	<style>
</head>
 
<body>

	<h1> MOZAIEK TV-ZENDERS </h1>

	<div class="mozaiek-container">
	
		<!-- === VTM GO === -->
        <!-- Directe links naar de eb-videoplayers van DPG -->
        <a href="https://vtmgo.be" target="_blank" class="mozaiek-item">          
            <img src="vtm.png" alt="VTM">
        </a>
		
		<!-- === PLAY === -->
        <a href="https://playtv.be" target="_blank" class="mozaiek-item">          
            <img src="play.png" alt="Play">
        </a>
			
		<!-- Npo1 -->
	    <a href="https://www.npo.nl/start/live/npo1" target="_blank" class="mozaiek-item">	          
            <img src="npo1-nl.png" alt="NPO1">
		</a>
		
		<!-- Npo2 -->
	    <a href="https://www.npo.nl/start/live/npo2" target="_blank" class="mozaiek-item">	          
            <img src="npo2-nl.png" alt="NPO2">
		</a>
		
		<!-- Npo3 -->
	    <a href="https://www.npo.nl/start/live/npo3" target="_blank" class="mozaiek-item">	          
            <img src="npo3-nl.png" alt="NPO3">
		</a>
		
			
		<!-- RINGTV -->
		<a href="https://ringtv.be/kijk-ring" target="_blank" class="mozaiek-item">	          
            <img src="ringtv.png" alt="RINGTV">
		</a>
		
		<!-- ROBTV -->
		<a href="https://www.robtv.be/website" target="_blank" class="mozaiek-item">	          
            <img src="robtv.jpg" alt="ROBTV">
		</a>
		
		<!-- Mijn Gids -->
		<a href="https://mijn-tv-gids.be" target="_blank" class="mozaiek-item"
			<img src="tvgids.png" alt=""MIJN TV GIDS">
		</a>
				
	</div>
</body>
</html>
