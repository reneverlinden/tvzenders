<!DOCTYPE html>

    <meta charset="UTF-8">

    <title>Mijn TV ZENDERS</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .mozaiek-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        .mozaiek-item {
            background-color: #222;
            border: 3px solid transparent;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 16 / 9;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .mozaiek-item:focus, .mozaiek-item:hover {
            border-color: #3b82f6;
            background-color: #333;
            transform: scale(1.05);
            outline: none;
        }
        .mozaiek-item img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="mozaiek-container">
